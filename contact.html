<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<main class="contact-page">
    <section class="contact-header">
        <h1>Get In <span>Touch</span></h1>
        <p>আপনার কোনো প্রশ্ন থাকলে বা প্রজেক্ট নিয়ে আলোচনা করতে চাইলে সরাসরি যোগাযোগ করুন।</p>
    </section>

    <div class="contact-container">
        <div class="contact-info">
            <div class="info-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <p>riyad.sqa@example.com</p>
            </div>
            <div class="info-card">
                <i class="fab fa-whatsapp"></i>
                <h3>WhatsApp</h3>
                <p>+880 1XXX XXXXXX</p>
            </div>
            <div class="info-card">
                <i class="fas fa-map-marker-alt"></i>
                <h3>Location</h3>
                <p>Dhaka, Bangladesh</p>
            </div>

            <div class="social-box">
                <h4>Follow Me:</h4>
                <div class="social-links-grid">
                    <a href="#" class="s-link fb"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="s-link ln"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#" class="s-link gh"><i class="fab fa-github"></i></a>
                    <a href="#" class="s-link wa"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>

        <div class="contact-form-box">
            <form id="contactForm">
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                </div>
                <input type="text" placeholder="Subject" required>
                <textarea placeholder="Your Message..." rows="6" required></textarea>
                <button type="submit" class="btn btn-primary full-width">Send Message <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>
</main>
